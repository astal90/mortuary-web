<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortuary System - Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container narrow">
    <div class="card">
      <h1>Daftar Akaun</h1>
      <p class="muted">Isi maklumat untuk mohon akaun baru</p>

      <label>Nama Penuh</label>
      <input id="registerFullName" type="text" placeholder="Masukkan nama penuh" />

      <label>Username</label>
      <input id="registerUsername" type="text" placeholder="Masukkan username" />

      <label>Password</label>
      <input id="registerPassword" type="password" placeholder="Masukkan password" />

      <label>Confirm Password</label>
      <input id="registerConfirmPassword" type="password" placeholder="Ulang password" />

      <button id="registerBtn">Daftar</button>

      <p id="registerMsg" class="msg"></p>

      <hr style="margin: 16px 0; border: 0; border-top: 1px solid #e5e7eb;">

      <a href="index.html" style="text-decoration:none;">
        <button type="button" class="btn-secondary">Kembali ke Login</button>
      </a>
    </div>
  </div>

  <script src="offline-db.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
