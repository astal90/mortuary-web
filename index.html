<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortuary System - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container narrow">
    <div class="card">
      <h1>Mortuary System</h1>
      <p class="muted">Login pengguna</p>

      <label>Username</label>
      <input id="loginUsername" type="text" placeholder="Masukkan username" />

      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Masukkan password" />

      <button id="loginBtn">Login</button>

      <p id="loginMsg" class="msg"></p>
    </div>
  </div>

  <script src="offline-db.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
