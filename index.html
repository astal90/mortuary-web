<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mortuary System - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container narrow">
    <div class="card">
      <h1>Mortuary System</h1>
      <p class="muted">Login pengguna</p>

      <label>Username</label>
      <input id="loginUsername" type="text" placeholder="Masukkan username" />

      <label>Password</label>
      <input id="loginPassword" type="password" placeholder="Masukkan password" />

      <button id="loginBtn">Login</button>

      <p id="loginMsg" class="msg"></p>

      <hr style="margin: 16px 0; border: 0; border-top: 1px solid #e5e7eb;">

      <p class="muted" style="margin-bottom: 8px;">Belum ada akaun?</p>
      <a href="register.html" style="text-decoration:none;">
        <button type="button" class="btn-secondary">Daftar Akaun Baru</button>
      </a>
    </div>
  </div>

  <script src="offline-db.js"></script>
  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
